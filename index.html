<!DOCTYPE html>
<html>
<head>
    <title>Student Score Predictor</title>
</head>
<body>
    <h2>Student Score Prediction</h2>

    <input id="hours" placeholder="Hours Studied"><br><br>
    <input id="attendance" placeholder="Attendance"><br><br>

    <button onclick="predict()">Predict</button>

    <h3 id="result"></h3>

<script>
async function predict() {
    const data = {
        Hours_Studied: parseFloat(document.getElementById("hours").value),
        Attendance: parseFloat(document.getElementById("attendance").value),
        Sleep_Hours: 7,
        Previous_Scores: 75,
        Tutoring_Sessions: 2,
        Physical_Activity: 3,
        Parental_Involvement: "High",
        Access_to_Resources: "Medium",
        Extracurricular_Activities: "Yes",
        Motivation_Level: "High",
        Internet_Access: "Yes",
        Family_Income: "Low",
        School_Type: "Public",
        Peer_Influence: "Positive",
        Learning_Disabilities: "No",
        Gender: "Male"
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerText =
        "Predicted Score: " + result.predicted_score.toFixed(2);
}
</script>
</body>
</html>
