<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Score Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-900 to-slate-900 min-h-screen flex items-center justify-center text-white">

<div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">

    <h1 class="text-2xl font-bold mb-6 text-center text-indigo-400">
        🎓 Student Score Predictor
    </h1>

    <form id="scoreForm" class="space-y-4">
        
        <input type="number" id="hours" placeholder="Study Hours"
            class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500">

        <input type="number" id="attendance" placeholder="Attendance (%)"
            class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500">

        <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 transition p-3 rounded-lg font-semibold">
            Predict Score
        </button>
    </form>

    <div id="result" class="mt-6 text-center text-lg font-semibold text-green-400"></div>

</div>

<script>
document.getElementById("scoreForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const hours = document.getElementById("hours").value;
    const attendance = document.getElementById("attendance").value;

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            hours: hours,
            attendance: attendance
        })
    });

    const data = await response.json();
    document.getElementById("result").innerText = "Predicted Score: " + data.prediction;
});
</script>

</body>
</html>
